{# Bottom Navigation - Customer side #}
{% set active = active_nav | default('home') %}
<nav class="fixed bottom-0 left-0 right-0 z-30">
  <div class="max-w-md mx-auto bg-white border-t border-gray-200 px-4 py-2">
    <div class="flex justify-around items-center">
      <a href="{{ url_for('customer.home') }}"
         class="flex flex-col items-center gap-1 py-2 px-4 rounded-xl
                {% if active == 'home' %}bg-brand-100 text-brand-700{% else %}text-gray-500{% endif %}">
        <i data-lucide="home" class="w-5 h-5"></i>
        <span class="text-xs font-semibold">Home</span>
      </a>
      <a href="{{ url_for('customer.menu_list') }}"
         class="flex flex-col items-center gap-1 py-2 px-4 rounded-xl
                {% if active == 'menu' %}bg-brand-100 text-brand-700{% else %}text-gray-500{% endif %}">
        <i data-lucide="utensils-crossed" class="w-5 h-5"></i>
        <span class="text-xs font-semibold">Menu</span>
      </a>


      <a href="{{ url_for('customer.track_form') }}"
         class="flex flex-col items-center gap-1 py-2 px-4 rounded-xl
                {% if active == 'orders' %}bg-brand-100 text-brand-700{% else %}text-gray-500{% endif %}">
        <i data-lucide="receipt" class="w-5 h-5"></i>
        <span class="text-xs font-semibold">Orders</span>
      </a>
    </div>
  </div>
</nav>
