{% extends "base.html" %}

{% block header %}
<header class="sticky top-0 z-30 bg-cream/95 backdrop-blur border-b border-gray-200/60">
  <div class="flex items-center justify-between px-4 py-3">
    <div class="flex items-center gap-2">
      <button class="p-1 -ml-1"><i data-lucide="menu" class="w-6 h-6 text-gray-700"></i></button>
      <a href="{{ url_for('admin.dashboard') }}" class="flex items-center gap-1.5">
        <i data-lucide="chef-hat" class="w-6 h-6 text-brand-600"></i>
        <span class="font-bold text-lg text-brand-700">Dapur Hijrah</span>
      </a>
    </div>
    <a href="{{ url_for('auth.logout') }}" title="Logout">
      <img src="https://i.pravatar.cc/40?img=33" alt="Admin"
           class="w-8 h-8 rounded-full border-2 border-brand-200">
    </a>
  </div>
</header>
{% endblock %}

{% block bottom_nav %}
{% set active = active_nav | default('home') %}
<nav class="fixed bottom-0 left-0 right-0 z-30">
  <div class="max-w-md mx-auto bg-white border-t border-gray-200 px-4 py-2">
    <div class="flex justify-around items-center">
      <a href="{{ url_for('admin.dashboard') }}"
         class="flex flex-col items-center gap-1 py-2 px-4 rounded-xl
                {% if active == 'home' %}bg-brand-100 text-brand-700{% else %}text-gray-500{% endif %}">
        <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
        <span class="text-xs font-semibold">Home</span>
      </a>
      <a href="{{ url_for('admin.menu_management') }}"
         class="flex flex-col items-center gap-1 py-2 px-4 rounded-xl
                {% if active == 'menu' %}bg-brand-100 text-brand-700{% else %}text-gray-500{% endif %}">
        <i data-lucide="utensils-crossed" class="w-5 h-5"></i>
        <span class="text-xs font-semibold">Menu</span>
      </a>
      <a href="{{ url_for('admin.order_list') }}"
         class="flex flex-col items-center gap-1 py-2 px-4 rounded-xl
                {% if active == 'orders' %}bg-brand-100 text-brand-700{% else %}text-gray-500{% endif %}">
        <i data-lucide="receipt" class="w-5 h-5"></i>
        <span class="text-xs font-semibold">Orders</span>
      </a>
    </div>
  </div>
</nav>
{% endblock %}
