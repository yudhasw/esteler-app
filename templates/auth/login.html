{% extends "base.html" %}
{% block title %}Login Admin · Dapur Hijrah{% endblock %}
{% block container_padding %}{% endblock %}

{% block content %}
<div class="min-h-screen flex flex-col justify-center px-4 py-6">
<div class="w-full max-w-sm mx-auto">

  <!-- Logo -->
  <div class="flex items-center justify-center gap-2 mb-8">
    <i data-lucide="chef-hat" class="w-7 h-7 text-brand-600"></i>
    <span class="font-bold text-xl text-brand-700">Dapur Hijrah</span>
  </div>

  <!-- Hero Card -->
  <div class="bg-gradient-to-br from-gray-300 to-gray-400 rounded-3xl p-6 mb-6 shadow-card">
    <h1 class="text-3xl font-bold text-white mb-1">Login Admin</h1>
    <p class="text-gray-100 text-sm">Kelola kesegaran menu Es Teler Anda</p>
  </div>

  <!-- Form Card -->
  <form method="POST" action="{{ url_for('auth.login') }}"
        class="bg-white rounded-3xl p-6 shadow-soft space-y-5">

    <!-- Username -->
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">Nama Pengguna</label>
      <div class="relative">
        <i data-lucide="user" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input type="text" name="username" required autofocus
               placeholder="Nama Pengguna"
               class="w-full pl-11 pr-4 py-3 rounded-2xl bg-gray-50 border border-gray-200
                      text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white">
      </div>
    </div>

    <!-- Password -->
    <div>
      <div class="flex items-center justify-between mb-2">
        <label class="text-sm font-semibold text-gray-700">Kata Sandi</label>
        <a href="{{ url_for('auth.forgot_password') }}"
           class="text-sm text-amber-600 font-medium hover:underline">Lupa Sandi?</a>
      </div>
      <div class="relative">
        <i data-lucide="lock" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input type="password" name="password" id="password" required
               placeholder="••••••••"
               class="w-full pl-11 pr-11 py-3 rounded-2xl bg-gray-50 border border-gray-200
                      text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white">
        <button type="button" onclick="togglePassword()"
                class="absolute right-4 top-1/2 -translate-y-1/2">
          <i data-lucide="eye" class="w-4 h-4 text-gray-500"></i>
        </button>
      </div>
    </div>

    <!-- Remember -->
    <label class="flex items-center gap-2 cursor-pointer">
      <input type="checkbox" name="remember"
             class="w-4 h-4 rounded border-gray-300 text-brand-600 focus:ring-brand-500">
      <span class="text-sm text-gray-700">Ingat password saya</span>
    </label>

    <!-- Submit -->
    <button type="submit"
            class="w-full bg-brand-500 hover:bg-brand-600 active:bg-brand-700
                   text-white font-bold py-3.5 rounded-2xl shadow-soft
                   flex items-center justify-center gap-2 transition">
      Masuk Sekarang
      <i data-lucide="log-in" class="w-5 h-5"></i>
    </button>
  </form>

  <p class="text-center text-xs text-gray-400 mt-6 tracking-wider">
    © 2026 DAPUR HIJRAH BRAND. SELURUH HAK CIPTA DILINDUNGI.
  </p>
</div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
